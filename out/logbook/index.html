uckily, the previously mentioned algorithm for selecting the final list of elements was able to pare this down to a list of 41 elements (I set the cap to 10,000 tokens).\r\n\r\nThen, GPT-4 picked this element as the most relevant, which contains a link to the Wikipedia page for the Mojave Desert:\r\n```\r\n\u003cp\u003e\r\n\u003c!-- Abbreviated for readability --\u003e\r\n\u003c!-- ... --\u003e\r\n\u003ca href=\"/wiki/Sonoran_Desert\" title=\"Sonoran Desert\"\u003eSonoran\u003c/a\u003e, and\r\n\u003ca href=\"/wiki/Mojave_Desert\" title=\"Mojave Desert\"\u003eMojave\u003c/a\u003e deserts.\r\n\u003csup id=\"cite_ref-179\" class=\"reference\"\u003e\r\n\u003ca href=\"#cite_note-179\"\u003e[167]\u003c/a\u003e\r\n\u003c/sup\u003e\r\n\u003c!-- ... --\u003e\r\n\u003c/p\u003e\r\n```\r\n\r\nIf you're wondering why this element contains so extra HTML beyond just the link itself, it's because I set the 'parents' parameter to 1, which, if you recall, means that all matching elements will be returned with their immediate parent element.\r\n\r\nAfter recieving this element as part of the 'GET_ELEMENT' tool output, the assistant decided to use the 'INTERACT_WITH_ELEMENT' tool to try and click on that link:\r\n```\r\n[NEW STEP] 👉 [{\"type\":\"function\",\"name\":\"interact_with_element\"}]\r\nRunning 1 function...\r\n{\r\n\"elementCode\": \"16917\",\r\n\"url\": \"https://en.wikipedia.org/wiki/United_States\",\r\n\"directive\": \"Click on the link to the Mojave Desert page\"\r\n}\r\n```\r\n\r\nThe 'INTERACT_WITH_ELEMENT' tool used GPT-4-32K to process that idea into a Playwright action:\r\n```\r\nRunning writeAction with azure32k...\r\nWrite Action Response:\r\n\"(async () =\u003e {\r\n  await page.click('p a[href=\\\"/wiki/Mojave_Desert\\\"]');\r\n})();\"\r\n```\r\n\r\nMy Playwright crawler ran the action, and the browser successfully navigated to the Mojave Desert page.\r\n\r\nFinally, I processed the new page with GPT-4-Vision and sent a summary of the browser status back to the assistant as part of the tool output:\r\n```\r\nSummarize Status Response:\r\n\"We clicked on a link to the Wikipedia page for the Mojave Desert. And now we are looking at the Wikipedia page for the Mojave Desert.\"\r\n```\r\n\r\nThe assistant decided that the goal was not yet reached, so it repeated the process on the new page. Once again, it's initial search terms were too specific, and the results were sparse. But on it's 2nd try, it came up with these terms:\r\n```\r\n[TOOL CALL] 🔧 get_element\r\n[REQUIRES_ACTION]\r\nRunning one function...\r\n{\r\n\"url\": \"https://en.wikipedia.org/wiki/Mojave_Desert\",\r\n\"searchTerms\": [\r\n\"square miles\",\r\n\"square kilometers\",\r\n\"km2\",\r\n\"mi2\",\r\n\"area\",\r\n\"acreage\",\r\n\"expansion\",\r\n\"size\",\r\n\"span\",\r\n\"coverage\"\r\n],\r\n\"directive\": \"Locate the specific section or paragraph that states the total land area of the Mojave Desert on the Wikipedia page\"\r\n}\r\n```\r\n\r\nThe 'GET_ELEMENT' tool initial found 21 matches, totaling to 491,000 tokens, which was pared down to 12. Then GPT-4 picked this as the most relevant of the 12, which contains the search term \"km2\":\r\n```\r\n\u003ctr\u003e\r\n\u003cth class=\"infobox-label\"\u003eArea\u003c/th\u003e\r\n\u003ctd class=\"infobox-data\"\u003e81,000 km\u003csup\u003e2\u003c/sup\u003e(31,000 sq mi)\u003c/td\u003e\r\n\u003c/tr\u003e\r\n```\r\n\r\nThis element corresponds to this section of the rendered page:\r\n![image](/support/images/Untitled18.png)\r\n\r\nIn this case, we wouldn't have been able to find this answer if I hadn't set 'parents' to 1, because the answer we're looking for is in a sibling of the matching element, just like in our Cuba example.\r\n\r\nThe 'GET_ELEMENT' tool passed the element back to the assistant, who correctly noticed that the information within satisfied our goal. Thus it completed it's run, letting me know that the answer to my question is 81,000 square kilometers:\r\n\r\n```\r\n[FINAL MESSAGE] ✅ The total land area of the Mojave Desert is 81,000 square kilometers or 31,000 square miles.\r\n{\r\n\"status\": \"complete\",\r\n\"info\": {\r\n\"area_km2\": 81000,\r\n\"area_mi2\": 31000\r\n}\r\n}\r\n```\r\n\r\n### **Closing Thoughts**\r\n\r\nI had a lot of fun building this thing, and learned a ton. That being said, it's still a fragile system. I'm looking forward to taking it to the next level. Here are some of the things I'd like to improve about it:\r\n\r\n- Generating smarter search terms so it can find relevant elements faster\r\n- Implementing fuzzy search in my 'GET_ELEMENT' tool to account for slight variations in text\r\n- Using the vision model to label images \u0026 icons in the HTML so the assistant can interact with them\r\n- Enhancing the stealth of the crawler with residental proxies and other techniques\r\n\r\nThanks for reading! If you have any questions or suggestions, feel free to reach out to me on [Twitter](https://twitter.com/harshc_). :)\r\n"])</script><script>self.__next_f.push([1,"24:T5b64,"])</script><script>self.__next_f.push([1,"\r\nLately, I've dived into the world of web scrapers, and with the rapid developments in AI, I thought it would be fascinating to attempt creating a 'universal' scraper. This would be one that can navigate the web step by step until it finds exactly what it's looking for. It's a work in progress, but I wanted to share what I've achieved so far.\r\n\r\n### **Specifications**\r\n\r\nStarting with a URL and a high-level objective, the web scraper should:\r\n\r\n1. Analyse the given webpage\r\n2. Extract text information from relevant sections\r\n3. Perform any necessary interactions\r\n4. Continue until the goal is achieved\r\n\r\n### **Tools Used**\r\n\r\nThough this is mainly a backend project, I decided to use **NextJs** in case I want to add a frontend later. For the web crawling, I chose [**Crawlee**](https://crawlee.dev/), which is built on top of [**Playwright**](https://playwright.dev/), a browser automation library.\r\n\r\nCrawlee adds some nice features for disguising the scraper as a regular user and offers a request queue to manage the order of requests, which is super useful if I ever want to make this available for others.\r\n\r\nFor the AI components, I'm using [**OpenAI**](https://platform.openai.com/docs/api-reference/introduction)'s API along with Microsoft Azure's [**OpenAI Service**](https://azure.microsoft.com/en-us/products/ai-services/openai-service). Across these, I'm leveraging three different models:\r\n\r\n- **GPT-4-32k** ('gpt-4-32k')\r\n- **GPT-4-Turbo** ('gpt-4-1106-preview')\r\n- **GPT-4-Turbo-Vision** ('gpt-4-vision-preview')\r\n\r\nThe GPT-4-Turbo models are similar to the original GPT-4 but boast a larger context window (128k tokens) and are much faster (up to 10x). However, these improvements come at a price: the GPT-4-Turbo models are a bit less intelligent than the original GPT-4, which posed challenges in the more complex stages of my scraper. So, I switched to GPT-4-32K when I needed more processing power.\r\n\r\nGPT-4-32K is a variant of the original GPT-4 but offers a 32k context window instead of 4k. I ended up using Azure's OpenAI service to access GPT-4-32K because OpenAI currently limits access to that model on their platform.\r\n\r\n### **Getting Started**\r\n\r\nI began by working backwards from my constraints. Since I was using a Playwright crawler, I knew I would eventually need an element selector from the page to interact with it.\r\n\r\nFor those unfamiliar, an element selector is a string that identifies a specific part of a page. For example, to select the fourth paragraph on a page, you could use the selector `p:nth-of-type(4)`. If you wanted to select a button with the text 'Click Me,' you could use `button:has-text('Click Me')`. Playwright identifies the element you want using a selector and then performs an action on it, like 'click()' or 'fill()'.\r\n\r\nGiven this requirement, my first task was to identify the 'element of interest' on a given webpage. I'll refer to this as the 'GET_ELEMENT' function from here on out.\r\n\r\n## **Getting the Element of Interest**\r\n\r\n### **Approach 1: Screenshot + Vision Model:**\r\n\r\nHTML data can be highly detailed and lengthy. Most of it focuses on styling, layout, and interactive logic rather than the text content. I was concerned that text models would struggle with this complexity, so I thought of bypassing it using the GPT-4-Turbo-Vision model. This model would 'look' at the rendered page and extract the most relevant text, which I could then use to search through the raw HTML for the element containing that text.\r\n\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626945/new-website/support/images/Untitled2.png)\r\n\r\n**This approach quickly fell apart:**\r\nFirstly, GPT-4-Turbo-Vision sometimes refused to transcribe text, saying things like, \"Sorry, I can't help with that.\" At one point, it said, \"Sorry, I can't transcribe text from copyrighted images.\" It seems OpenAI discourages this use case. (A workaround might be mentioning that you're visually impaired, but I wouldn't recommend it!)\r\n\r\nThe bigger issue was tall pages that resulted in very large screenshots (over 8,000 pixels). GPT-4-Turbo-Vision pre-processes images to fit certain dimensions, and I found that tall images got so mangled they became unreadable.\r\n\r\nOne potential solution could be segmenting the page, summarizing each part, and then concatenating the results. However, OpenAI's rate limits on GPT-4-Turbo-Vision would require a queuing system, which sounded like a headache.\r\n\r\nLastly, reverse-engineering a working element selector from the text alone wouldn't be trivial since you don't know the underlying HTML structure. For these reasons, I decided to drop this approach.\r\n\r\n### **Approach 2: HTML + Text Model**\r\n\r\nThe text-only GPT-4-Turbo has more generous rate limits, and with a 128k context window, I decided to try passing the entire HTML of the page to see if it could identify the relevant elements.\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626949/new-website/support/images/Untitled3.png)\r\n\r\nWhile the HTML data often fit within the limit, the GPT-4-Turbo models were not consistently smart enough to get it right. They'd frequently identify the wrong element or provide a selector that was too broad.\r\n\r\nI tried reducing the HTML by isolating the body and removing script and style tags, which helped a bit, but it still wasn't enough. Identifying \"relevant\" HTML elements from a full page seems too fuzzy and obscure for language models to handle well. I needed a way to narrow down the elements I could present to the text model.\r\n\r\nIn my next approach, I took inspiration from how we humans would tackle this issue.\r\n\r\n### **Approach 3: HTML + Text Search + Text Model**\r\n\r\nWhen searching for specific information on a webpage, I'd use 'Control' + 'F' to search for a keyword. If my initial search doesn't find a match, I'd try different keywords until I succeed.\r\n\r\nThis approach's benefit is that simple text searches are fast and easy to implement. In this context, a text model could generate search terms, and a simple regex search on the HTML could perform the search.\r\n\r\nGenerating search terms would take longer than conducting the search, so instead of searching one term at a time, I could ask the text model to generate several terms simultaneously and search for them concurrently. Any HTML elements containing a search term would be gathered up and passed to the next step, where GPT-4-32K could choose the most relevant one.\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626957/new-website/support/images/Untitled4.png)\r\nIf enough search terms are used, a lot of HTML will be retrieved, possibly triggering API limits or affecting the next step's performance. I devised a scheme to fill a list of relevant elements up to a specific length.\r\n\r\nI instructed the Turbo model to generate 15-20 terms, ranked by estimated relevance. Then, using a regex search, I looked through the HTML to find every element that contained a term. By the end, I had a list of lists, with each sublist containing all elements that matched a term:\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626958/new-website/support/images/Untitled5.png)\r\n\r\nI then populated a final list with elements from these lists, giving preference to those appearing earlier in the lists. For instance, let's say the ranked search terms are: 'pricing', 'fee', 'cost', and 'prices'. When filling the final list, I'd ensure more elements from the 'pricing' list than the 'fee' list, and more from 'fee' than 'cost', and so on.\r\n\r\nOnce the final list reached the predefined token length, I'd stop filling it, ensuring I never exceeded the token limit for the next step.\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626959/new-website/support/images/Untitled6.png)\r\n\r\nIf you're curious about the code for this algorithm, here's a simplified version:\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626960/new-website/support/images/Untitled7.png)\r\n\r\nThis approach did the trick. Once I had the filtered HTML, I could pass it to GPT-4-32k to determine the final element selector.\r\n\r\nAnalyzing these elements' relationships to each other, the model was much more accurate at selecting the correct element. It could focus on the essence of the content rather than getting bogged down by the minutiae.\r\n\r\nFinally, the GPT-4-32k model would deliver a selector for the correct element, which the scraper would use to either extract content or perform an action.\r\n\r\nLet's say that my AI is trying to find out the capital of Cuba. It would search the word 'capital' and find this element in orange. The problem is that the information we need is in the green element - a sibling. We've gotten close to the answer, but without including both elements, we won't be able to solve the problem.\r\n\r\nIf you're curious about the code for this algorithm, here's a simplified version:\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626961/new-website/support/images/Untitled9.png)\r\nTo solve this problem, I decided include 'parents' as an optional parameter in my element search function. Setting a parent of 0 meant that the search function would return only the element that directly contained the text (which natually includes the children of that element).\r\n\r\nSetting a parent of 1 meant that the search function would return the parent of the element that directly contained the text. Setting a parent of 2 meant that the search function would return the grandparent of the element that directly contained the text, and so on. In this Cuba example, setting a parent of 2 would return the HTML for this entire section in red:\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626937/new-website/support/images/Untitled11.png)\r\n\r\nI decided to set the default parent to 1. Any higher and I could be grabbing huge amounts of HTML per match.\r\n\r\nSo now that we've gotten a list of manageable size, with a helpful amount of parent context, it was time to move to the next step: I wanted to ask GPT-4-32K to pick the most relevant element from this list.\r\n\r\nThis step was pretty straight forward, but it took a bit of trial and error to get the prompt right:\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626938/new-website/support/images/Untitled12.png)\r\n\r\nAfter this step, I would end up with the single most relevant element on the page, which I could then pass to the next step, where I would have an AI model decide what type of interaction would be necessary to accomplish the goal.\r\n\r\n## **Setting up an Assistant**\r\n\r\nThe process of extracting a relevant element worked, but it was a bit slow and stochastic. What I needed at this point was a sort of 'planner' AI that could see the result of the previous step and try it again with different search terms if it didn't work well.\r\n\r\nLuckily, this is exactly what OpenAI's [Assistant API](https://platform.openai.com/docs/assistants/overview) helps accomplish. An 'Assistant' is a model wrapped in extra logic that allows it to operate autonomously, using custom tools, until a goal is reached. You initialize one by setting the underlying model type, defining the list of tools it can use, and sending it messages.\r\n\r\nOnce an assistant is running, you can poll the API to check up on its status. If it has decided to use a custom tool, the status will indicate the tool it wants to use with the parameters it wants to use it with. That's when you can generate the tool output and pass it back to the assistant so it can continue.\r\n\r\nFor this project, I set up an Assistant based on the GPT-4-Turbo model, and gave it a tool that triggered the GET_ELEMENT function I had just created.\r\n\r\nHere's the description I provided for the GET_ELEMENT tool:\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626938/new-website/support/images/Untitled12.png)\r\nYou'll notice that in addition to the most relevant element, this tool also returns the quantity of matching elements for each provided search term. This information helped the Assistant decide whether or not to try again with different search terms.\r\n\r\nWith this one tool, the Assistant was now capable of solving the first two steps of my spec: Analyzing a given web page and extracting text information from any relevant parts. In cases where there's no need to actually interact with the page, this is all that's needed. If we want to know the pricing of a product, and the pricing info is contained in the element returned by our tool, the Assistant can simply return the text from that element and be done with it.\r\n\r\nHowever, if the goal requires interaction, the Assistant will have to decide what type of interaction it wants to take, then use an additional tool to carry it out. I refer to this additional tool as 'INTERACT_WITH_ELEMENT'\r\n\r\n### **Interacting with the Relevant Element**\r\n\r\nTo make a tool that interacts with a given element, I thought I might need to build a custom API that could translate the string responses from an LLM into Playwright commands, but then I realized that the models I was working with already knew how to use the Playwright API (perks of it being a popular library!). So I decided to simply generate the commands directly in the form of an async immediately-invoked function expression (IIFE).\r\n\r\nThus, the plan became:\r\n\r\nThe assistant would provide a description of the interaction it wanted to take, I would use GPT-4-32K to write the code for that interaction, and then I would execute that code inside of my Playwright crawler.\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626939/new-website/support/images/Untitled13.png)\r\n\r\nHere's the description I provided for the INTERACT_WITH_ELEMENT tool:\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626940/new-website/support/images/Untitled14.png)\r\nYou'll notice that instead of having the assistant write out the full element, it simply provides a short identifier, which is much easier and faster.\r\n\r\nBelow are the instructions I gave to GPT-4-32K to help it write the code. I wanted to handle cases where there may be relevant information on the page that we need to extract before interacting with it, so I told it to assign extracted information to a variable called 'actionOutput' within it's function.\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626941/new-website/support/images/Untitled15.png)\r\n\r\nI passed the string output from this step - which I'm calling the 'action' - into my Playwright crawler as a parameter, and used the 'eval' function to execute it as code (yes, I know this could be dangerous)\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626942/new-website/support/images/Untitled16.png)\r\n\r\n## **Conveying the State of the Page**\r\n\r\nAt this point I realized that I needed a way to convey the state of the page to the Assistant. I wanted it to craft search terms based on the page it was on, and simply giving it the url felt sub-optimal. Plus, sometimes my crawler failed to load pages properly, and I wanted the Assistant to be able to detect that and try again.\r\n\r\nTo grab this extra page context, I decided to make a new function that used the GPT-4-Vision model to summarize the top 2048 pixels of a page. I inserted this function in the two places it was necessary: at the very beginning, so the starting page could be analyzed; and at the conclusion of the INTERACT_WITH_ELEMENT tool, so the assistant could understand the outcome of its interaction.\r\n\r\nWith this final piece in place, the Assistant was now capable of deciding if a given interaction worked as expected, or if it needed to try again. This was super helpful on pages that threw a Captcha or some other pop up. In such cases, the assistant would know that it had to circumvent the obstacle before it could continue.\r\n\r\n## **The Final Flow**\r\n\r\nLet's recap the process to this point: We start by giving a URL and a goal to an assistant. The assistant then uses the 'GET_ELEMENT' tool to extract the most relevant element from the page.\r\n\r\nIf an interaction is appropriate, the assistant will use the 'INTERACT_WITH_ELEMENT' tool to write and execute the code for that interaction. It will repeat this flow until the goal has been reached.\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626943/new-website/support/images/Untitled17.png)\r\nNow it was time to put it all to the test by seeing how well it could navigate through Wikipedia in search of an answer.\r\n\r\n## **Testing the Assistant**\r\n\r\nMy ultimate goal is to build a universal web scraper that would work on every page, but for a starting test, I wanted to see how well it could work within the reliable envionment of Wikipedia, where each page contains a huge amount of links to many other pages. The assistant should have no problem finding information within this domain.\r\n\r\nI gave it the Wikipedia page for the United States and told it: \"I want to know total land area of the Mojave Desert.\"\r\n\r\nThe Unites States page contains nearly 1.5 million characters of HTML content, which roughly translates to 375,000 tokens. So this would be a good test of the system's ability to handle large amounts of data.\r\n\r\nAs anticipated, the assistant reached for the 'GET_ELEMENT' tool, but its initial search terms were poor. These terms were likely too specific to render exact matches on the page:\r\n\r\n```\r\nTOOL CALL] ðŸ”§ get_element\r\n[REQUIRES_ACTION]\r\nRunning 1 functions...\r\n{\r\n\"url\": \"https://en.wikipedia.org/wiki/United_States\",\r\n\"searchTerms\": [\r\n\"Mojave Desert link\",\r\n\"Mojave link\",\r\n\"desert link\",\r\n\"link Mojave\",\r\n\"link desert\"\r\n],\r\n\"directive\": \"Find a link to the Mojave Desert page to get information on its total land area\"\r\n}\r\n```\r\n\r\nSure enough, the tool found 0 matches across all terms.\r\n\r\n```\r\nSearching for matching elements. Token limit: 10000\r\nFound 0 matching elements (0 tokens)\r\nNo matching elements\r\nSending Tool Output...\r\n\"tool_call_id\": \"call_aZbkE2kM02qjXL7kx5KDdeWb\",\r\n\"output\": \"{\"error\":\"Error: No matching elements found.\"}\"\r\n```\r\n\r\nSo, the assistant decided to try again, and this time it used a lot more terms, which were more generic:\r\n```\r\n[TOOL CALL] ðŸ”§ get_element\r\n[REQUIRES_ACTION]\r\nRunning 1 functions...\r\n{\r\n\"url\": \"https://en.wikipedia.org/wiki/United_States\",\r\n\"searchTerms\": [\r\n\"Mojave\",\r\n\"Desert\",\r\n\"Mojave Desert\",\r\n\"geography\",\r\n\"landscape\",\r\n\"environment\",\r\n\"Nature\",\r\n\"ecosystem\",\r\n\"biome\",\r\n\"land\",\r\n\"climate\",\r\n\"terrain\",\r\n\"Landforms\",\r\n\"physical\"\r\n],\r\n\"directive\": \"Find a link to the Mojave Desert page on Wikipedia from the United States page\"\r\n}\r\n```\r\n\r\nThe tool found 134 matching elements across these terms, which totaled to over 3,000,000 tokens (probably because there's a lot of overlap among the returned elements). Luckily, the previously mentioned algorithm for selecting the final list of elements was able to pare this down to a list of 41 elements (I set the cap to 10,000 tokens).\r\n\r\nThen, GPT-4 picked this element as the most relevant, which contains a link to the Wikipedia page for the Mojave Desert:\r\n```\r\n\u003cp\u003e\r\n\u003c!-- Abbreviated for readability --\u003e\r\n\u003c!-- ... --\u003e\r\n\u003ca href=\"/wiki/Sonoran_Desert\" title=\"Sonoran Desert\"\u003eSonoran\u003c/a\u003e, and\r\n\u003ca href=\"/wiki/Mojave_Desert\" title=\"Mojave Desert\"\u003eMojave\u003c/a\u003e deserts.\r\n\u003csup id=\"cite_ref-179\" class=\"reference\"\u003e\r\n\u003ca href=\"#cite_note-179\"\u003e[167]\u003c/a\u003e\r\n\u003c/sup\u003e\r\n\u003c!-- ... --\u003e\r\n\u003c/p\u003e\r\n```\r\n\r\nIf you're wondering why this element contains so extra HTML beyond just the link itself, it's because I set the 'parents' parameter to 1, which, if you recall, means that all matching elements will be returned with their immediate parent element.\r\n\r\nAfter recieving this element as part of the 'GET_ELEMENT' tool output, the assistant decided to use the 'INTERACT_WITH_ELEMENT' tool to try and click on that link:\r\n```\r\n[NEW STEP] ðŸ‘‰ [{\"type\":\"function\",\"name\":\"interact_with_element\"}]\r\nRunning 1 function...\r\n{\r\n\"elementCode\": \"16917\",\r\n\"url\": \"https://en.wikipedia.org/wiki/United_States\",\r\n\"directive\": \"Click on the link to the Mojave Desert page\"\r\n}\r\n```\r\n\r\nThe 'INTERACT_WITH_ELEMENT' tool used GPT-4-32K to process that idea into a Playwright action:\r\n```\r\nRunning writeAction with azure32k...\r\nWrite Action Response:\r\n\"(async () =\u003e {\r\n  await page.click('p a[href=\\\"/wiki/Mojave_Desert\\\"]');\r\n})();\"\r\n```\r\n\r\nMy Playwright crawler ran the action, and the browser successfully navigated to the Mojave Desert page.\r\n\r\nFinally, I processed the new page with GPT-4-Vision and sent a summary of the browser status back to the assistant as part of the tool output:\r\n```\r\nSummarize Status Response:\r\n\"We clicked on a link to the Wikipedia page for the Mojave Desert. And now we are looking at the Wikipedia page for the Mojave Desert.\"\r\n```\r\n\r\nThe assistant decided that the goal was not yet reached, so it repeated the process on the new page. Once again, it's initial search terms were too specific, and the results were sparse. But on it's 2nd try, it came up with these terms:\r\n```\r\n[TOOL CALL] ðŸ”§ get_element\r\n[REQUIRES_ACTION]\r\nRunning one function...\r\n{\r\n\"url\": \"https://en.wikipedia.org/wiki/Mojave_Desert\",\r\n\"searchTerms\": [\r\n\"square miles\",\r\n\"square kilometers\",\r\n\"km2\",\r\n\"mi2\",\r\n\"area\",\r\n\"acreage\",\r\n\"expansion\",\r\n\"size\",\r\n\"span\",\r\n\"coverage\"\r\n],\r\n\"directive\": \"Locate the specific section or paragraph that states the total land area of the Mojave Desert on the Wikipedia page\"\r\n}\r\n```\r\n\r\nThe 'GET_ELEMENT' tool initial found 21 matches, totaling to 491,000 tokens, which was pared down to 12. Then GPT-4 picked this as the most relevant of the 12, which contains the search term \"km2\":\r\n```\r\n\u003ctr\u003e\r\n\u003cth class=\"infobox-label\"\u003eArea\u003c/th\u003e\r\n\u003ctd class=\"infobox-data\"\u003e81,000 km\u003csup\u003e2\u003c/sup\u003e(31,000 sq mi)\u003c/td\u003e\r\n\u003c/tr\u003e\r\n```\r\n\r\nThis element corresponds to this section of the rendered page:\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626944/new-website/support/images/Untitled18.png)\r\n\r\nIn this case, we wouldn't have been able to find this answer if I hadn't set 'parents' to 1, because the answer we're looking for is in a sibling of the matching element, just like in our Cuba example.\r\n\r\nThe 'GET_ELEMENT' tool passed the element back to the assistant, who correctly noticed that the information within satisfied our goal. Thus it completed it's run, letting me know that the answer to my question is 81,000 square kilometers:\r\n\r\n```\r\n[FINAL MESSAGE] âœ… The total land area of the Mojave Desert is 81,000 square kilometers or 31,000 square miles.\r\n{\r\n\"status\": \"complete\",\r\n\"info\": {\r\n\"area_km2\": 81000,\r\n\"area_mi2\": 31000\r\n}\r\n}\r\n```\r\n\r\n### **Closing Thoughts**\r\n\r\nI had a lot of fun building this thing, and learned a ton. That being said, it's still a fragile system. I'm looking forward to taking it to the next level. Here are some of the things I'd like to improve about it:\r\n\r\n- Generating smarter search terms so it can find relevant elements faster\r\n- Implementing fuzzy search in my 'GET_ELEMENT' tool to account for slight variations in text\r\n- Using the vision model to label images \u0026 icons in the HTML so the assistant can interact with them\r\n- Enhancing the stealth of the crawler with residental proxies and other techniques\r\n\r\nThanks for reading! If you have any questions or suggestions, feel free to reach out to me on [Twitter](https://twitter.com/harshc_). :)\r\n\r\n"])</script><script>self.__next_f.push([1,"25:T9d1,"])</script><script>self.__next_f.push([1,"\r\nMany people get into tech because they want to build a startup and change the world. But, as I've learned through my own journey, the skills needed to write code are not the same as those needed to build a successful business. The secret sauce is not taught computer science programs or at bootcamps.\r\n\r\nThis gap is significant, especially for those who dream of not just joining tech giants like Apple in 2024 but also for the trailblazers aspiring to be the founders of the next big thing.\r\n\r\nA fundamental skill of building a product involves continuous evolution of product strategy. This is where feedback, analytics and iteration become invaluable. It's more than just building once; building, marketing, testing, learning from real-world feedback, and adapting are all critical ingredients. In our journey, for instance, the process of constantly tweaking and improving our product based on customer data has been crucial. It's a cycle of iteration that helps functional products becoming great ones.\r\n\r\nA critical aspect of this iterative process is **measurement**. Understanding what to measure and setting realistic goals and metrics are foundational to any business's success. It's goes past trusting your gut; it's about making informed changes. At Craftwork, we've seen over and over that honest and realistic measurement of the right metrics is key. This approach helps us not only in refining our product but also in steering the business effectively.\r\n\r\nIt's a practice of self-honesty that transforms insights into actionable steps towards improvement.\r\n\r\nThis involves acknowledging what's working and, more importantly, what isn't. As I've built out my work with my personal site, I do my best to apply these same principles of measurement, honesty and self-reflection.\r\n\r\nRegularly evaluating my creation and engagement strategies has been a journey. I do my best to regularly take an objective look at what resonates and what falls flat, and making informed decisions from there. This process, though sometimes daunting, is incredibly rewarding as it leads to a deeper understanding of my audience and a more impactful online presence.\r\n\r\nWhether you're developing a product, building a business, or working on something else, I encourage you to constantly question, measure, and refine. So, take this challenge: measure your work, ask the hard questions, and be ready to change.\r\n\r\nWe're all somewhere between the before-picture and the after-picture. The key is to keep moving forward.\r\n"])</script><script>self.__next_f.push([1,"26:T4113,"])</script><script>self.__next_f.push([1,"\r\nSince the 1950s, the journey of artificial intelligence (AI) has mirrored the tale of the boy who cried wolf, with grand claims that ultimately fell short of expectations. Visionaries like Herbert Simon and Marvin Minsky set ambitious goals for achieving Artificial General Intelligence (AGI) by the year 2000. Fast forward to 2021, AI offerings were primarily confined to niche areas (like Siri and Alexa), faced drawn-out developments (such as autonomous vehicles and robotics), or were specialized for specific tasks (including recommender systems, facial recognition, language translation, and customized advertisements).\r\n\r\nFor many years, AI's potential appeared to be monopolized by major tech firms and academic circles. Meanwhile, the majority of the population turned their attention and resources towards more immediately lucrative ventures, such as benefitting from the wealth generated by tech giants, investing in the surge of cryptocurrencies, founding Software as a Service (SaaS) startups with high market valuations, or managing growing venture capital funds.\r\n\r\nHowever, the introduction of ChatGPT half a year ago took even industry insiders by surprise with its swift expansion. Despite the tech sector's growth, the advancement of AI has been driven by a relatively small segment of the industry compared to previous technological revolutions like the internet or software development. The development and deployment of technologies like ChatGPT, Claude, and Bard stem from the transformer architecture introduced in 2017, yet, only a handful of individuals have actively worked on scaling these innovations. Together, OpenAI and Anthropic have less than 800 employees.\r\n\r\nThis rapid shift, facilitated by a few, has sparked concerns among many tech professionals about being left behind in this new era. Such anxieties give rise to various illusions of *hope* (believing that the large language model market will evolve in a favorable manner), *cope* (downplaying one’s market position), and *despair* (feeling as though the 'game' has already been lost).\r\n\r\nCurrently, these illusions fuel exaggerated stories about foundational model fears, doubts and uncertainties (FUD), the superior performance of open-source models, the invulnerability of established players, infatuation among investors, and pessimistic proclamations. Navigating these narratives demands a healthy dose of skepticism, and even this examination should be approached critically (note, FF has invested in Scale, a key model provider).\r\n\r\nLet's debunk some of the popular yet misleading narratives that are often presented with unwavering confidence despite the uncertain trajectory of the AI industry.\r\n\r\n### The Myth of Foundational Models Hitting Their Peak\r\n\r\nFor those not involved in the recent breakthrough in developing cutting-edge large language models (LLMs), there's a temptation to believe these models represent the pinnacle of what’s achievable.\r\n\r\nThis has led to many companies initiating substantial funding rounds to develop \"superior\" foundational models, pitching themselves as necessary alternatives to organizations like OpenAI and Anthropic, but promising lower costs, greater openness, minimal filtering, enhanced architecture, better localization, or improved specificity for certain domains.\r\n\r\nEntering the language model sector in 2023 entails reconciling with one's non-dominant market stance. Critical self-reflection might include accepting current models as a historical endpoint, imagining a future with multiple successful models, or dismissing the idea of an unassailable market advantage.\r\n\r\nA common sentiment is skepticism towards significant improvements from GPT-5 over GPT-4, suggesting a saturation point in LLM capabilities. Such views, however, may indicate a reluctance to accept the continuous potential for innovation. Assuming GPT-4 marks the upper limit of current LLM development ignores the possibility of numerous equally successful LLMs and minimal disruption to existing business models.\r\n\r\nYet, even a conservative outlook fails to dim the prospect of more advanced LLMs within the next half-decade. Suppose for a moment that critics are correct, and GPT-5 represents only a modest advancement. Even so, GPT-4 embodies untapped potential. By training on exclusive data, lowering operational costs, and enhancing user experience, we can catalyze significant advancements in model capabilities, unlocking vast economic benefits.\r\n\r\nAdoption of new innovations is often gradual. It took the older generation a decade to regularly use Google, and I'm still mastering GPT-4. However, with further advancements in model capabilities and the development of software utilizing current LLM technology, 2023 will not be remembered as a standstill moment.\r\n\r\n### The Debate on Open Source Models' Dominance\r\n\r\nRecently, open-source initiatives have gained momentum, from adaptations of Whisper to LLaMA developments. There are various stakeholders hopeful for the success of open-source models, including:\r\n\r\n- Developers wary of depending on large corporations\r\n- Venture capitalists (VCs) and AI infrastructure startups benefiting from a diversified model landscape\r\n- Individuals feeling sidelined in the 2023 narrative of AI\r\n- Major tech firms lacking a platform to monopolize infrastructure spending\r\n- Advocates for an uncontrollable product for benign or harmful purposes\r\n- Advocates for products free from political bias\r\n\r\nWhether this widespread interest translates into open-source models triumphing remains to be seen. Public discourse on open source software’s merits is nuanced, given its protected status and the unseemliness of disparaging comments.\r\n\r\nNevertheless, there's an underlying belief that open-source models might not become the primary choice for state-of-the-art, commercial models. Clayton Christensen once expressed concern over the iPhone's closed system, fearing that the inevitable shift towards open modular architecture, illustrated by the personal computer's evolution and Android's rapid growth, would diminish Apple's market hold.\r\n\r\nThe current discussion around open-source AI models mirrors the initial Apple vs. Android debate, where modular, open-source frameworks unequivocally democratize technology access, as seen in emerging markets predominantly using Android. However, cohesive products often secure the most value. Despite holding only a 21% share in smartphone shipments, the iPhone captures 50% of the revenue and 82% of profits.\r\n\r\nExamining the list of operating systems reveals a plethora of options, though few have had significant impact. The dominance of operating systems followed an even more pronounced power-law distribution than smartphones did. Within the realm of open-source systems, Linux emerged as the singular power-law champion. Nearly every tech market follows this pattern: smartphones, social networks, cloud infrastructure, and even SaaS.\r\n\r\nRegulatory actions could potentially restrict open-source models for safety reasons, but market dynamics also place open-source in a challenging position for most applications. While open-source models introduce necessary competition, keeping the price and neutrality of closed models in check, the case for open-source would be stronger if large foundational model enterprises were engaging in egregious pricing or censoring practices.\r\n\r\nOpen-source makes sense in specific contexts:\r\n\r\n1. For large organizations, open-source models could be crucial: they allow companies to maintain control and privacy. In the data warehouse sector, some choose Databricks over Snowflake for its data interoperability, versus Snowflake’s more restrictive architecture.\r\n2. For applications where immediate response time trumps model quality (such as real-time speech-to-text), local deployment of open-source models can offer speed at the expense of accuracy and scope.\r\n\r\nYet, when it comes to consumer-facing LLM applications and SaaS, surpassing the quality of closed-source, meticulously maintained, integrated solutions is challenging. Based on rigorous evaluations, leading-edge models still outperform open-source alternatives. As expectations for LLM reliability, versatility, and robustness continue to climb, open-source models are unlikely to become the predominant solution for applications, capturing an even smaller share of the overall value.\r\n\r\n### The Fallacy of Incumbent Supremacy in AI\r\n\r\nThe notion that only existing market leaders will triumph in AI fosters a defeatist mindset, assuming the race is already decided. Recent developments have indeed tilted in favor of incumbents, as seen with Microsoft’s GitHub Copilot, OpenAI's buzz, NVIDIA's surge due to increased GPU demand, and Google's cloud platform benefiting from Midjourney.\r\n\r\nWhile the shift to cloud computing posed significant challenges for 20th-century software firms, allowing newcomers like Salesforce and Atlassian to thrive, integrating LLMs seems remarkably straightforward for incumbents. Many have quickly leveraged obvious opportunities, with Notion, Epic Health, Intercom, and Zendesk incorporating AI into their services.\r\n\r\nThe adaptability of LLM APIs and incumbents’ extensive reach have resulted in immediate successes. In the short term, AI appears more as a progressive innovation rather than a disruptive force. However, this view may lack creative foresight at the product concept stage, where it's simpler to adapt existing solutions than to envision entirely new opportunities.\r\n\r\nEven with GPT-4 and upcoming models' capabilities, completely novel product categories could emerge, diverging from the traditional formula of adding AI to incumbent workflows. These new ventures will demand distinct user experiences to attract customers. This is a golden opportunity for startups to position themselves against incumbents by designing radically different product experiences.\r\n\r\nThe burst of high-quality LLMs has already spurred promising niches, including enterprise search (Glean), legal automation (Harvey, Casetext), and marketing automation (Typeface, Jasper). These applications have the potential to flourish. Pioneering new categories takes time;during the productivity boom of the 2010s, platforms like Figma and Notion required years to develop market-ready products.\r\n\r\nClaiming that only incumbents will emerge victorious is an oversimplified perspective, justifying inaction with the belief that all opportunities are already seized. The idea of a major technological shift without room for new entrants is implausible.\r\n\r\n### The Reality of VC-Backed AI Ventures\r\n\r\nConversely, some view the AI landscape with undue optimism, particularly venture capitalists (VCs) dreaming of lucrative start-up investments. Historically, VC involvement has been closely associated with technological breakthroughs. Rapid advancements typically spell success for VCs.\r\n\r\nHowever, VCs hold little stake in leading AI companies today. Few VCs have investments in giants like NVIDIA or Microsoft. Even among scalable startups, Midjourney progressed without VC backing, and OpenAI has only a minimal portion of its funding from this sector.\r\n\r\nVenture capitalists, with their focus on early-stage investments, strive to craft narratives around opportunities for budding startups in new foundation models, vector databases, and LLM-driven applications. While some of these stories may hold merit, there is a natural bias among VCs to envision favorable market dynamics that promise AI returns.\r\n\r\nQuickly assembled LLM infrastructure landscapes by various firms insert AI into a simplistic SaaS model framework of the 2010s, suggesting a proliferation of niche solutions comprising an \"AI stack,\" with each capturing a slice of value.\r\n\r\nThis approximation appears fragile. Much of today's infrastructure is designed to complement LLM shortcomings: additional modalities, enhanced monitoring, linked commands, expanded memory. However, the API-based construction of foundation models abstracts away the complexities of infrastructure from developers. Incremental improvements to models gradually render the surrounding infrastructure ecosystem obsolete. If a few dominant LLMs prevail, a robust infrastructure ecosystem becomes less critical.\r\n\r\nOn the application level, VCs may find more fertile ground, with new entrants requiring venture capital to launch. LLMs will unveil new software categories across various industries, from legal to healthcare to service sectors. Nevertheless, since software incumbents can also leverage LLM APIs, the application-level prospects for startups will be confined to innovative product concepts.\r\n\r\nIf the number of VC-investable openings is limited, VCs will play a minimal role in the significant platform transformation of recent decades. At the infrastructure level, VCs fervently wish for a fragmented AI stack narrative to hold true, serving both as a coping strategy and a demonstration of their grasp on the industry to limited partners and founders.\r\n\r\nCertainly, some VC-supported businesses will grow into substantial, independent entities. However, they should be evaluated cautiously given the underlying motives. The pace at which VCs deploy capital may outstrip the realization of successful venture-backed endeavors.\r\n\r\n### The Call to Decelerate AI Advancements\r\n\r\nNumerous individuals have reasons to advocate for slowing down LLM development: competing foundation model creators not leading the pack, the Chinese Communist Party (CCP), employees facing potential job losses, and those fearing AI's implications.\r\n\r\n**Underdog LLM developers:** The \"Pause Giant AI Experiments\" open letter appeared to be thinly disguised competitive FUD, motivated by self-interest. Many signatories were AI researchers trailing behind in advancements, seeking time to catch up.\r\n\r\n**The CCP:** China's emphasis on the quantity of LLM releases, as opposed to their quality or prevalence, is a strong indicator of them lagging behind the US. Like the letter's signatories, China would benefit from a slowdown in US LLM advancements, helping them close the competitive gap.\r\n\r\n**Employees at risk of displacement:** Individuals in positions potentially replaceable by AI, such as copywriters or call center staff, have a professional interest in delaying AI's progress.\r\n\r\nHighlighting GPT-4's failures in tasks involving mathematics and logic has gained popularity. There’s a sense of reassurance in acknowledging that AI has not yet surpassed human capabilities in every area.\r\n\r\n**AI pessimists:** While the potential dangers of AI should be taken seriously, the argument for an imminent AI catastrophe is unfalsifiable ; a doomed forecast cannot be disproven easily. The underlying value systems of these commentators also introduce biases, warranting a critical analysis remaining an exercise for the reader.\r\n\r\nThe argument for slowing down should be approached with caution, especially in the absence of concrete evidence suggesting an imminent AI escalation. Premature alarm could undermine the credibility of AI safety discussions, with premature doomsday predictions potentially desensitizing people to genuine risks. Meanwhile, the potential benefits of AI for humanity are too significant to postpone.\r\n\r\n## In Closing\r\n\r\nThe initial years of the internet in the mid-1990s and the dawn of cryptocurrencies in the early 2010s saw a select few participants, most of whom reaped financial rewards.\r\n\r\nIn contrast, the launch of ChatGPT has drawn a vast audience keen to engage in the AI arena, including researchers, developers, VCs, and startups. However, unlike previous technological shifts, the scenario with LLMs suggests that relatively few newcomers may succeed in this deployment phase. The immediate and evident value proposition of LLMs has spurred rapid demand, unlike the delayed acceptance of the internet or crypto. The leading players in the AI sector are advancing at an unprecedented pace.\r\n\r\nGiven the disproportionate influence of a few individuals defining AI's frontier, the broader tech community is left grappling with biases and misinformation. The prevailing discourse is often a blend of despair (mope), denial (cope), and opportunism (hope).\r\n\r\nWhile this analysis has not covered every prevailing AI narrative, caution should be exercised whenever statements are presented with absolute certainty. Given the early stage of this technological cycle, the truth remains elusive and requires proactive engagement through dialogue and firsthand experiences. Trust must be placed in direct observation and involvement.\r\n"])</script><script>self.__next_f.push([1,"27:T2095,"])</script><script>self.__next_f.push([1,"\r\n## Summary\r\nIn the thriving ecosystem of startup development, grasping the nuances of angel investment is critical for any growth or product manager. This comprehensive guide details strategies for engaging with different categories of angel investors, understanding their investment criteria, and effectively raising pre-seed or seed rounds. It compares and contrasts seed vs. angel investment, discusses preparation for successful negotiations, and introduces digital tools like AngelList's Roll-up Vehicle for streamlining investment processes. This guide is an essential resource for any startup looking to harness the strategic value of angel investors for long-term growth.\r\n\r\n## Introduction to Angel Investing\r\nAngel investing plays a crucial role in the success of startups, providing them with essential funding and strategic support. As a growth or product manager, it is essential to understand the world of angel investment and how to attract the right investors for your startup.\r\n\r\n### Understanding Angel Investors\r\nAngel investors are individuals who invest their personal funds in early-stage startups in exchange for ownership equity or convertible debt. They often have industry experience and are willing to take on higher risks in the hopes of earning significant returns on their investments.\r\n\r\n### The Importance of Angel Investment in Startups\r\nAngel investors not only provide much-needed capital but also bring valuable expertise and connections to the table. Their guidance and support can help startups navigate challenges, refine their business strategies, and unlock growth opportunities.\r\n\r\n## Types of Angel Investors\r\nTo diversify your startup's support system, it's crucial to understand the different profiles of angel investors. Here are some common types of angel investors:\r\n\r\n### Family Investors\r\nFamily investors are individuals within your personal network who believe in your vision and are willing to invest in your startup. While they may provide a smaller amount of capital, their support can be instrumental in getting your venture off the ground.\r\n\r\n### Founder Angels\r\nFounder angels are successful entrepreneurs who have been through the startup journey themselves. They bring hands-on experience and strategic guidance, making them invaluable mentors for early-stage startups.\r\n\r\n### Connector Angels\r\nConnector angels have extensive networks and can open doors to potential partnerships, industry insights, and further funding opportunities. Their ability to connect startups with the right people can be a game-changer for growth.\r\n\r\n### Subject-Matter Expert Angels\r\nSubject-matter expert angels have deep domain knowledge in specific industries or technologies. Their expertise and industry connections can provide targeted guidance and support to startups operating in niche markets.\r\n\r\n### Corporate Executive Angels\r\nCorporate executive angels come from various corporate backgrounds and bring valuable industry-specific knowledge and managerial experience to startups. Their insights can help streamline operations and open doors to corporate partnerships.\r\n\r\nUnderstanding the preferences and areas of expertise of each type of angel investor can help you find the right match for your startup's needs.\r\n\r\n## Investor Expectations\r\nWhen approaching angel investors, it's crucial to understand what they look for in startups. Here are some key expectations angel investors typically have:\r\n\r\n### Team Dynamics and Expertise\r\nAngel investors are interested in passionate and cohesive teams with a clear vision. They value founders who have the necessary expertise and complementary skill sets to execute their business plan successfully.\r\n\r\n### Market Size and Growth Potential\r\nInvestors seek startups that address substantial markets with scalable solutions. They want to see that your business has the potential for significant long-term growth and a clear path to market domination.\r\n\r\n### The Significance of a Detailed Business Plan\r\nA well-developed business plan is essential to win the trust of angel investors. It should include a comprehensive market analysis, financial projections, and a clear marketing strategy. A detailed plan demonstrates your preparedness and commitment to success.\r\n\r\n### Alignment with Investor Values and Problems\r\nAngel investors often gravitate towards startups that solve problems they can personally relate to. When pitching to potential investors, highlight how your product or service addresses a real pain point in the market and how it resonates with the investor's values.\r\n\r\n## Raising Funds from Angels\r\nRaising funds from angel investors requires careful planning and execution. Here are some strategies for success:\r\n\r\n### Crafting the Perfect Pitch\r\nDevelop a concise and compelling pitch that highlights your unique value proposition, market potential, and the expertise of your team. Tailor your pitch to each investor to demonstrate your understanding of their interests and align your startup with their investment philosophy.\r\n\r\n### Demonstrating Business Scalability\r\nAngel investors want to see the potential for significant returns on their investment. Showcase how your business model is scalable and how you plan to capture a sizable market share. Highlight any early traction, customer validation, or competitive advantages you have.\r\n\r\n### Utilizing Digital Platforms for Efficiency\r\nWith the rise of digital platforms, fundraising has become more accessible and efficient. Utilize platforms like AngelList's Roll-up Vehicle to streamline the investment process, manage funds inflows, and handle legal formalities efficiently.\r\n\r\n## Seed vs. Angel Investment\r\nIt's crucial to understand the differences between seed and angel investment:\r\n\r\n### Seed Investment\r\nSeed investment refers to the initial capital raised by a startup to fund its operations. It often comes from multiple sources, including angel investors. Seed funding can help startups validate their ideas, build prototypes, and reach key milestones.\r\n\r\n### Angel Investment\r\nAngel investment is a specific form of early-stage financing. Angel investors invest their personal funds directly into startups, often in exchange for equity or convertible debt. Angel investment is a subset of seed funding and can provide startups with not only capital but also valuable mentorship and connections.\r\n\r\nUnderstanding the distinctions between seed and angel investment can help you position your startup for the right type of funding and attract the most suitable investors.\r\n\r\n## Managing Angel Investment Rounds\r\nManaging angel investment rounds can be complex. Here are some considerations to keep in mind:\r\n\r\n### Navigating the Costs and Complexities\r\nRaising capital from multiple individual investors can be time-consuming and costly. Utilize tools like AngelList's Roll-up Vehicle to efficiently manage numerous small investments by combining them into a single entry on your cap table, simplifying legal and administrative processes.\r\n\r\n### Leveraging AngelList's Roll-up Vehicle\r\nAngelList's Roll-up Vehicle can streamline the collection of investment from multiple angel investors. It provides a centralized platform for managing funds inflows, investor accreditation, and legal formalities.\r\n\r\n### Addressing Angel Investor Concerns\r\nAddress any concerns or questions angel investors may have during the fundraising process. Be open, transparent, and provide them with the information they need to make an informed decision. Balance the need for confidentiality with the need to build trust and cooperation.\r\n\r\n## Concluding Thoughts and Resources\r\nFundraising is an iterative and continuous process. Building meaningful relationships with angel investors takes time and effort. By following the strategies outlined in this guide, startup founders and growth managers can navigate the complex landscape of angel investment, attract the right investors, and focus on scaling their businesses with confidence.\r\n\r\nRemember, every investor is different, and it's essential to understand their specific preferences and requirements. Seek further guidance from industry experts, join startup communities, and leverage resources available online to refine your fundraising strategy and improve your chances of success.\r\n\r\nHappy building and fundraising!\r\n"])</script><script>self.__next_f.push([1,"28:T35f4,"])</script><script>self.__next_f.push([1,"﻿---\r\ntitle: \"Building MCP Server and Client\"\r\ndate: \"2026-03-02\"\r\ndescription: \"Hands-on MCP projects covering theory, a terminal server, and a React plus Electron client stack.\"\r\ncoverImage: \"https://www.k2view.com/hubfs/Frame%20238551.png\"\r\ncategory: \"Proof of work\"\r\ntags: [\"MCP\", \"AI Tools\", \"Developer Platform\"]\r\n---\r\nThe Model Context Protocol (MCP) represents a paradigm shift in how AI systems interact with data sources and tools. This document synthesizes insights from a comprehensive presentation covering the evolution of AI adoption, the challenges of fragmented AI ecosystems, and how MCP provides a unified solution for context management across different platforms and tools.\r\n\r\n---\r\n\r\n## Part 1: The Evolution of AI Adoption and The Problem of Silos\r\n\r\n### The Three Stages of AI Adoption\r\n\r\nThe integration of Large Language Models into everyday workflows has progressed through three transformative stages:\r\n\r\n#### Stage 1: Experimentation (The Wonder Phase)\r\n\r\nWhen ChatGPT launched, it achieved unprecedented growth: **1 million users in 5 days** and **100 million users in 2 months**. For the first time in software history, humans could interact with software without coding, treating it like everyday conversations. Early adopters experimented with creative prompts such as *\"Write a poem on Pizza in the style of Gulzar\"* or *\"What would happen if AI starts breeding tomorrow?\"* Social media platforms exploded with AI-generated content, showcasing the technology's creative potential.\r\n\r\n#### Stage 2: Professional Adoption\r\n\r\nAs the novelty wore off, professionals began incorporating AI into their daily workflows. ChatGPT became an indispensable tool for:\r\n\r\n- Text summarization and content generation\r\n- Email composition and communication\r\n- Lesson planning and educational content\r\n- Code debugging and development assistance\r\n\r\nThis stage marked a significant increase in individual productivity, as AI transitioned from entertainment to practical utility.\r\n\r\n#### Stage 3: The Ecosystem Explosion (The Now)\r\n\r\nThe current stage is characterized by proliferation of specialized AI tools and integrations:\r\n\r\n- Microsoft Copilot became omnipresent across the Microsoft ecosystem\r\n- Google Suite introduced comprehensive AI integrations\r\n- Specialized tools emerged: Perplexity for research, Replit and Cursor for development\r\n- Every major platform developed its own AI wrapper and integration\r\n\r\n### The Critical Problem: Fragmented AI Ecosystems\r\n\r\nDespite this explosion of AI capabilities, a fundamental problem emerged: **the problem of silos**. Each AI tool operated within its own isolated ecosystem:\r\n\r\n- AI in Notion couldn't communicate with AI in Slack\r\n- Cursor couldn't access messages on Microsoft Teams\r\n- Each AI agent had its own character and limitations\r\n- Users possessed an \"army of AI agents\" but couldn't coordinate them effectively\r\n\r\nUsers found themselves juggling multiple AI assistants, each locked within its platform. The dream was clear: **one unified assistant** that could understand their entire work context and solve problems across all platforms. However, the biggest bottleneck preventing this unified AI experience was **context**.\r\n\r\n### Understanding Context: The Foundation of AI Intelligence\r\n\r\nContext is everything an AI can see while generating a response. It encompasses:\r\n\r\n- Conversation history\r\n- External documents and data sources\r\n- User preferences and past interactions\r\n- Real-time information from connected tools\r\n\r\nFor example, when chatting with ChatGPT, the context includes all previous messages in the conversation. Without proper context, AI responses become generic and unhelpful. The challenge was enabling AI to access context from multiple sources simultaneously.\r\n\r\n---\r\n\r\n## Part 2: The Context Problem and Evolution of Solutions\r\n\r\n### A Product Manager's Journey: Before and After AI\r\n\r\nTo illustrate the context problem, consider a typical day in the life of a Product Manager:\r\n\r\n**Traditional Workflow:**\r\n1. Discovery (researching user needs and market trends)\r\n2. Analysis (evaluating data and insights)\r\n3. Documentation (creating specs and requirements)\r\n4. Request raising / development / Sprint planning\r\n5. User Acceptance Testing\r\n\r\n**With ChatGPT Introduction:** ChatGPT began assisting with analysis, documentation, and sprint planning. However, this created a new problem: the **\"Ctrl+C, Ctrl+V fallacy.\"**\r\n\r\n### The Ctrl+C, Ctrl+V Fallacy\r\n\r\nWhile AI could help with individual tasks, humans became **\"Human APIs\"** ; constantly transferring data between tools to build context:\r\n\r\n- Copying data from Slack to feed into ChatGPT\r\n- Manually extracting information from Google Drive to provide context\r\n- Transferring analysis results between different AI tools\r\n\r\nKey problems emerged:\r\n\r\n- Extensive data migration required between tools\r\n- Context building time exceeded actual productive work time\r\n- Non-sustainable workflow in the long run\r\n- Fragmented knowledge across multiple platforms\r\n\r\n### The Solution: Function Calling and Tools\r\n\r\n#### Function Calling Revolution\r\n\r\nIn late 2023, OpenAI introduced **function calling**, a breakthrough that enabled LLMs to interact with external systems. Function calling allows:\r\n\r\n- LLMs to call extension files and external APIs\r\n- Programmatic retrieval of structured data from GPT models\r\n- JSON-based responses with function names and arguments\r\n\r\n\u003e *According to HackWithGPT: \"OpenAI isn't executing the function for you, but it returns a JSON object with the function name it thinks should be called and the arguments to pass to the function.\"*\r\n\r\n#### The Advent of Tools\r\n\r\nFunction calling enabled a new generation of AI tools with specialized integrations:\r\n\r\n- Salesforce integration for sales teams to access CRM data\r\n- Slack bots reading chat history and channel context\r\n- Google Drive connectors for document access and collaboration\r\n- Database query tools analyzing organizational databases\r\n- GitHub integrations for code review and pull request management\r\n- HR tools for employee data access\r\n- Accounting system integrations for financial management\r\n- Marketing tools for campaign management\r\n- File system access with intelligent code search\r\n- Web browsing for real-time information retrieval\r\n\r\nMajor platforms rushed to add capabilities: ChatGPT introduced browsing, file uploads, and code execution; Claude gained computer access and tool integration; and parallel developments occurred across all major AI platforms.\r\n\r\n### The Integration Nightmare\r\n\r\nWhile tools solved the context problem, they created a new challenge: **the N×M integration problem.**\r\n\r\n**The Mathematics of Integration Complexity:**\r\n\r\n```\r\nN clients (AI applications) × M servers (data sources) = N×M unique integrations required\r\n```\r\n\r\n- Each integration had different authentication methods\r\n- Different data formats and APIs across platforms\r\n- Inconsistent error handling and protocols\r\n\r\n**Consequences:**\r\n\r\n- Development nightmare with exponentially increasing complexity\r\n- Maintenance burden across numerous custom integrations\r\n- Security vulnerabilities from inconsistent authentication\r\n- Significant cost and time wastage\r\n- Scaling impossibility\r\n\r\n---\r\n\r\n## Part 3: Model Context Protocol ; The Universal Solution\r\n\r\n### The MCP Paradigm\r\n\r\nLet's recap the problem: Every AI tool was creating its own API rules to integrate with platforms like GitHub. The solution was elegant: **GitHub builds an integration with standardized protocols that can be used by any AI tool.**\r\n\r\n### What is Model Context Protocol?\r\n\r\nModel Context Protocol is a **universal standard** that defines how AI applications interact with data sources.\r\n\r\nBreaking down the name:\r\n\r\n| Term | Meaning |\r\n|------|---------|\r\n| **Model** | Any LLM (GPT, Claude, Gemini, etc.) |\r\n| **Context** | All information provided to the LLM |\r\n| **Protocol** | Standardized rules that everyone must follow |\r\n\r\nMCP eliminates the N×M problem by providing a **single, standardized way** for any AI application to connect with any data source.\r\n\r\n### MCP Architecture: The Phone Analogy\r\n\r\nThink of MCP like a **phone with multiple SIM card slots**:\r\n\r\n- Phone with multiple SIM slots = **MCP Host** (the AI application)\r\n- SIM cards = **MCP Clients** (connection handlers)\r\n- Telephone providers = **MCP Servers** (data sources)\r\n\r\nJust as you can use any SIM card in a phone with standardized slots, any AI application can connect to any data source through MCP.\r\n\r\n**Key Components:**\r\n\r\n| Component | Description |\r\n|-----------|-------------|\r\n| **MCP Host** | The AI application (ChatGPT, Claude, custom apps) |\r\n| **MCP Client** | The connection layer within the host |\r\n| **MCP Server** | Data source implementations (GitHub, Google Drive, Slack, databases) |\r\n| **MCP Marketplace** | Central repository of available servers and integrations |\r\n\r\n### Real-World Application: Expense Calculator Demo\r\n\r\nTo demonstrate MCP's practical value, consider an expense tracking application built with MCP:\r\n\r\n**Problem it Solves:**\r\n- Maintaining long Excel spreadsheets for budget and expenses\r\n- Converting PDFs/Excel/images to spreadsheets for data evaluation\r\n- Limited to single-person usage in traditional systems\r\n\r\n**Functionality Enabled by MCP:**\r\n- Natural language expense and credit management\r\n- NLP-based editing and deletion of transactions\r\n- Automatic extraction from bank statements (Excel/PDF/images)\r\n- Visual dashboard generation for all expenses and credits\r\n- Multi-user support for tracking household expenses\r\n- Automatic categorization of expenses\r\n- Contextual date understanding (\"yesterday,\" \"day before yesterday\")\r\n\r\n**Technical Implementation:**\r\n- Remote MCP server (with local server option available)\r\n- SQLite database for data persistence\r\n- FastMCP library for protocol implementation\r\n\r\n### The New Normal with MCP\r\n\r\nWith MCP, the Product Manager's workflow transforms completely into a **unified AI workflow** with:\r\n\r\n- Single AI assistant (ChatGPT with MCP integration)\r\n- Connected to multiple tools through standardized MCP servers\r\n- Seamless context sharing across all platforms\r\n- No manual data transfer required\r\n- Real-time access to Slack, Google Drive, databases, GitHub, and more\r\n\r\n**Benefits:**\r\n\r\n| Benefit | Description |\r\n|---------|-------------|\r\n| **Standardization** | One protocol to rule them all |\r\n| **Scalability** | Easy addition of new data sources |\r\n| **Security** | Consistent authentication and authorization |\r\n| **Maintainability** | Updates to protocol benefit all integrations |\r\n| **Developer Experience** | Simple server creation with FastMCP library |\r\n| **User Experience** | Truly unified AI assistant |\r\n\r\n---\r\n\r\n## The Path Forward\r\n\r\nMCP represents the **infrastructure layer** for the next generation of AI applications. This protocol enables:\r\n\r\n- True AI agent autonomy across platforms\r\n- Elimination of data silos\r\n- Democratization of AI tool development\r\n- Reduced development and maintenance costs\r\n- Enhanced security through standardization\r\n- Seamless user experiences across all tools\r\n\r\nThe MCP marketplace is growing rapidly, with servers being developed for virtually every major platform and data source. This ecosystem approach ensures that as new platforms emerge, they can be instantly accessible to all MCP-compatible AI applications.\r\n\r\n# Let's talk technical: Building a MCP Server from Scratch\r\n\r\nAs AI continues to evolve, MCP will serve as the foundational infrastructure enabling seamless integration, enhanced productivity, and the realization of AI's full potential in transforming how we work.\r\n## Building MCP Server and Client\r\n\r\n**MCP servers** have been picking up fast lately, with more people building and expanding the ecosystem. But when it comes to MCP clients, it's still a pretty niche space. So far, only a handful of MCP clients exist. So, with this post, I just wanted to make it easier for anyone looking to get started with building MCP Client.\r\n\r\nWe will cover,\r\n\r\n- How to build MCP Client\r\n- Connect MCP Client to Local, Pre-built, Remote MCP Server\r\n\r\nIt's beautifully simple when you break it down\r\n\r\n**LLM + Transport Layer + Protocol Implementation = MCP Client**\r\n\r\nThink of it like this:\r\n\u003e Claude is a smart assistant, but by default, it can only *talk*. An MCP server gives Claude *hands* -\u003e the ability to actually **do things** on your computer, like running terminal commands.\r\n\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626945/new-website/images/Articles/MCP-Server/557773906-61e7585e-5009-4c1Articles7-8afe-e37dc2014cdc.png)\r\n\r\n\r\n## Some popular MCP Clients are:\r\n\r\n- Claude Desktop App\r\n- Cursor\r\n- Windsurf\r\n- Goose\r\n-VS Code Editor, and [there are few more.](https://modelcontextprotocol.io/clients#feature-support-matrix)\r\n\r\nWhile the previous diagram covered the high-level MCP client flow, the one below takes a closer look at how the MCP client and MCP server communicate step by step during a session.\r\n\r\nTo make it even clearer, here is a breakdown of the steps involved.\r\n\r\n1. Capture the user query\r\n2. Establishes connections to MCP servers\r\n3. Discovers server tools via the tools/list endpoint\r\n4. Forwards user queries and available tools to LLM\r\n5. Processes LLM responses to identify tool calls\r\n6. Executes tools using the server's tools/call endpoint\r\n7. Returns tool results to the LLM for continued conversation\r\n\r\n![image](https://res.cloudinary.com/dlnb4gked/image/upload/v1772626945/new-website/images/Articles/MCP-Server/557774767-d0a9d47f-3b61-4e86-97e1-18396aa570f7.png)\r\n\r\nNow that we have a basic idea of what an MCP client is, let us build one step by step. Once we put it into practice, the concepts will make a lot more sense and feel less abstract.\r\n"])</script><script>self.__next_f.push([1,"15:[\"$\",\"$1\",\"c\",{\"children\":[[\"$\",\"div\",null,{\"className\":\"space-y-12 max-w-6xl mx-auto\",\"children\":[[\"$\",\"header\",null,{\"className\":\"space-y-4 text-center pb-8\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"text-3xl sm:text-4xl md:text-5xl font-semibold tracking-tight\",\"children\":\"Logbook\"}],[\"$\",\"p\",null,{\"className\":\"text-base sm:text-lg text-muted-foreground max-w-2xl mx-auto\",\"children\":\"A collection of my writings, projects, frameworks, and reviews.\"}]]}],[\"$\",\"$19\",null,{\"fallback\":[\"$\",\"div\",null,{\"className\":\"text-center py-24 text-muted-foreground\",\"children\":\"Loading logbook...\"}],\"children\":[\"$\",\"$L1a\",null,{\"posts\":[{\"slug\":\"the-hidden-cost-of-ai-infrastructure\",\"type\":\"writing\",\"subpage\":\"$undefined\",\"meta\":{\"title\":\"The hidden cost of AI infrastructure\",\"date\":\"2026-03-05\",\"description\":\"Why AI infrastructure is quietly reshaping housing markets, electricity prices, and consumer costs.\",\"coverImage\":\"$undefined\",\"category\":\"Proof of work\",\"tags\":[\"AI\",\"Infrastructure\",\"Economics\",\"Data Centers\"]},\"content\":\"$1b\"},{\"slug\":\"Chunking-strategies-for-rag\",\"type\":\"writing\",\"subpage\":\"$undefined\",\"meta\":{\"title\":\"Why I Treat Chunking as a Product Decision\",\"date\":\"2026-03-04\",\"description\":\"I break down fixed-size, semantic, recursive, structure-based, and LLM chunking through a product lens and share how we should choose in production.\",\"coverImage\":\"$undefined\",\"category\":\"Proof of work\",\"tags\":[\"RAG\",\"LLMs\",\"Retrieval\",\"Proof Of Work\"]},\"content\":\"$1c\"},{\"slug\":\"how-i-think-about-moving-from-on-prem-infra

eadme)\\n- [Project Journal: Pastey](/projects/compound-product/project-journal)\\n- [Sample Inputs: Report and PRD](/projects/compound-product/sample-inputs)\\n- [Agent Execution Prompt](/projects/compound-product/agent-execution-prompt)\\r\\n\"},{\"slug\":\"kyc-ai-solutions\",\"type\":\"projects\",\"subpage\":\"$undefined\",\"meta\":{\"title\":\"KYC AI Solutions\",\"date\":\"2026-03-02\",\"description\":\"Dual-agent KYC architecture combining pre-submission validation and AI-assisted compliance review.\",\"coverImage\":\"$undefined\",\"category\":\"Proof of work\",\"tags\":[\"KYC\",\"Compliance\",\"AI Agents\"]},\"content\":\"$1e\"},{\"slug\":\"ai-continuous-compliance\",\"type\":\"projects\",\"subpage\":\"$undefined\",\"meta\":{\"title\":\"Context-Aware Control Automation for GRC \u0026 SaaS\",\"date\":\"2026-03-01\",\"description\":\"An AI-powered continuous compliance engine for real-time risk evaluation, automated control enforcement, and audit-ready reasoning.\",\"coverImage\":\"$undefined\",\"category\":\"Proof of work\",\"tags\":[\"GRC\",\"SOC 2\",\"ISO 27001\",\"AI Automation\",\"Compliance\"]},\"content\":\"$1f\"},{\"slug\":\"ai-decision-orchestration-platform-saas\",\"type\":\"projects\",\"subpage\":\"$undefined\",\"meta\":{\"title\":\"AI Decision Orchestration Platform (SaaS)\",\"date\":\"2026-03-01\",\"description\":\"Agentic intelligence for enterprise operations with context-aware AI decisions, confidence-based execution, and full auditability.\",\"coverImage\":\"$undefined\",\"category\":\"Proof of work\",\"tags\":[\"AI\",\"SaaS\",\"Enterprise\",\"GRC\",\"Automation\"]},\"content\":\"$20\"},{\"slug\":\"hadoop-to-bigquery-enterprise-modernization\",\"type\":\"projects\",\"subpage\":\"$undefined\",\"meta\":{\"title\":\"Enterprise Data Platform Modernization: Hadoop to BigQuery\",\"date\":\"2026-03-01\",\"description\":\"A six-month phased migration from legacy on-prem Hadoop to a secure, cloud-native BigQuery foundation with governance, compliance, and measurable business impact.\",\"coverImage\":\"$undefined\",\"category\":\"Proof of work\",\"tags\":[\"BigQuery\",\"Data Platform\",\"Cloud Migration\",\"Governance\",\"Compliance\"]},\"content\":\"$21\"},{\"slug\":\"ll-stack\",\"type\":\"projects\",\"subpage\":\"$undefined\",\"meta\":{\"title\":\"LL Stack\",\"date\":\"2026-02-26\",\"description\":\"A multi-page framework project covering the full LLM systems stack from infra to product.\",\"coverImage\":\"https://picsum.photos/seed/ll-stack/800/400\",\"category\":\"Frameworks\",\"tags\":[\"Framework\",\"LLM\",\"Systems\"]},\"content\":\"\\n# LL Stack\\n\\nThis project organizes the LLM systems stack into focused, linked pages so each layer can be explored independently.\\n\\n## What it covers\\n\\n- A practical 5-layer map\\n- Infra constraints and tradeoffs\\n- Model fundamentals\\n- Data, retrieval, and tools\\n- Orchestration and evaluation\\n- Product and UX strategy\\n\\n## Deep Dives\\n\\n- [LLM Stack: A Practical 5-Layer Map](/projects/ll-stack/llm-stack-5-layer-map)\\n- [Layer 1: Infra for LLM Products](/projects/ll-stack/layer-1-infra-for-llm-products)\\n- [Layer 2: Models and How They Differ](/projects/ll-stack/layer-2-models-and-how-they-differ)\\n- [Layer 3: Data, Knowledge, and RAG](/projects/ll-stack/layer-3-data-knowledge-and-rag)\\n- [Layer 4: Orchestration, Agents, and Evaluation](/projects/ll-stack/layer-4-orchestration-agents-and-evaluation)\\n- [Layer 5: App and Product Strategy](/projects/ll-stack/layer-5-app-and-product-strategy)\\r\\n\"},{\"slug\":\"the-space-between-product-and-ai\",\"type\":\"writing\",\"subpage\":\"$undefined\",\"meta\":{\"title\":\"The Space Between Product and AI\",\"date\":\"2025-08-18\",\"description\":\"In a world obsessed with speed and certainty, alignment between product and AI is rarely clean. It grows through tension, patience, and shared vulnerability. This piece reflects on what it takes to turn friction into flow, and why the most meaningful progress often begins in discomfort.\",\"coverImage\":\"$undefined\",\"category\":\"Logbook\",\"tags\":[\"Artificial Intelligence\",\"Deep-Dive Analysis\"]},\"content\":\"$22\"},{\"slug\":\"how-to-build-a-universal-ai-scraper\",\"type\":\"writing\",\"subpage\":\"$undefined\",\"meta\":{\"title\":\"How to build a Universal AI Scraper\",\"date\":\"2024-07-18\",\"description\":\"Lately, I've dived into the world of web scrapers, and with the rapid developments in AI, I thought it would be fascinating to attempt creating a universal scraper.\",\"coverImage\":\"$undefined\",\"category\":\"Logbook\",\"tags\":[\"Artificial Intelligence\",\"Deep-Dive Analysis\",\"Proof of work\"]},\"content\":\"$23\"},{\"slug\":\"AI Scraper\",\"type\":\"projects\",\"subpage\":\"$undefined\",\"meta\":{\"title\":\"How to build a Universal AI Scraper\",\"date\":\"2024-07-18\",\"description\":\"Lately, I've dived into the world of web scrapers, and with the rapid developments in AI, I thought it would be fascinating to attempt creating a universal scraper.\",\"coverImage\":\"$undefined\",\"category\":\"Proof of work\",\"tags\":[\"Artificial Intelligence\",\"Deep-Dive Analysis\",\"Proof Of Work\"]},\"content\":\"$24\"},{\"slug\":\"build-measure-listen-rebuild\",\"type\":\"writing\",\"subpage\":\"$undefined\",\"meta\":{\"title\":\"BUILD, MEASURE, LISTEN, REBUILD\",\"date\":\"2024-04-18\",\"description\":\"There's a difference between the skills needed to write code, and those needed to lead a successful business.\",\"coverImage\":\"$undefined\",\"category\":\"Logbook\",\"tags\":[\"Startup\"]},\"content\":\"$25\"},{\"slug\":\"vibe-coded-app-1\",\"type\":\"projects\",\"subpage\":\"$undefined\",\"meta\":{\"title\":\"Vibe Coded App 1\",\"date\":\"2024-01-10\",\"description\":\"A cool app built entirely on vibes.\",\"coverImage\":\"https://picsum.photos/seed/vibe1/800/400\",\"category\":\"Fun Projects\",\"tags\":[\"Next.js\",\"Tailwind\",\"Framer Motion\"]},\"content\":\"\\n# Vibe Coded App 1\\n\\n## What it does\\n\\nThis app is a showcase of how to build an application entirely based on vibes. It uses modern web technologies to deliver a seamless and interactive experience.\\n\\n## Why built\\n\\nI built this app to explore the boundaries of interactive design and to see how far I could push the concept of \\\"vibe coding\\\" — building software that feels good to use, not just functional.\\n\\n## Deep Dives\\n\\n- [Thought Process \u0026 Decisions](/projects/vibe-coded-app-1/thought-process)\\n- [Screen Designs](/projects/vibe-coded-app-1/screens)\\n\"},{\"slug\":\"my-favorite-tools-2023\",\"type\":\"writing\",\"subpage\":\"$undefined\",\"meta\":{\"title\":\"My Favorite Tools of 2023\",\"date\":\"2023-12-20\",\"description\":\"A review of the tools that kept me productive and sane this year.\",\"coverImage\":\"https://picsum.photos/seed/tools/800/400\",\"category\":\"Reviews\",\"tags\":[\"Tools\",\"Productivity\",\"Review\"]},\"content\":\"\\n# My Favorite Tools of 2023\\n\\nThis is a placeholder for the post \\\"My Favorite Tools of 2023\\\".\\n\\nHere are the tools that I used the most this year:\\n- Notion\\n- Linear\\n- Raycast\\n- Cursor\\n\"},{\"slug\":\"product-management-framework\",\"type\":\"writing\",\"subpage\":\"$undefined\",\"meta\":{\"title\":\"The Ultimate Product Management Framework\",\"date\":\"2023-12-01\",\"description\":\"A comprehensive framework for managing products from ideation to launch.\",\"coverImage\":\"https://picsum.photos/seed/framework/800/400\",\"category\":\"Frameworks\",\"tags\":[\"Framework\",\"Product\",\"Strategy\"]},\"content\":\"\\n# The Ultimate Product Management Framework\\n\\nThis is a placeholder for the post \\\"The Ultimate Product Management Framework\\\".\\n\\nA good framework helps you structure your thoughts and make better decisions. In this post, we'll explore a comprehensive framework for product management.\\n\"},{\"slug\":\"myths-and-realities-of-ais-rapid-evolution-2023\",\"type\":\"writing\",\"subpage\":\"$undefined
